[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
asyncio_mode = auto
# Session-scoped `running_proxy` runs uvicorn on the session loop.
# Tests must use the same loop or async I/O (httpx) never completes while the server responds on another loop.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts =
    -v
    --tb=short
    --strict-markers
